name: Build Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to build
        required: true
        default: 1.0.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Determine version
        id: version
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = "${{ github.ref_name }}".TrimStart("v")
          }
          "value=$v" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: powershell
        run: .\installer\build-installer.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ steps.version.outputs.value }}
          path: dist/*

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Pitsea RC Race Results ${{ steps.version.outputs.value }}
          files: dist/*
